<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Główny - Warsztat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #0d1117; color: #c9d1d9; padding: 40px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { font-size: 2.2rem; color: #f0f6fc; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        h2 { font-size: 1.4rem; color: #f0f6fc; margin-bottom: 15px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 25px; margin-bottom: 20px; }
        
        /* Przyciski */
        .btn { padding: 12px 20px; background: #238636; border: 1px solid rgba(240,246,252,0.1); color: #fff; border-radius: 6px; cursor: pointer; font-weight: bold; text-decoration: none; display: inline-block; transition: background 0.2s; }
        .btn:hover { background: #2ea043; }
        .btn-nav { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; margin-right: 10px; }
        .btn-nav:hover { background: #30363d; color: #58a6ff; }
        
        /* Statusy i Siatka Podglądu */
        .status-box { padding: 10px; background: #0d1117; border-radius: 6px; border: 1px solid #30363d; margin-top: 15px; font-size: 0.9rem; color: #8b949e; }
        .grid-podglad { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 15px; }
        .item-mini { background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        .item-qty { color: #58a6ff; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎛️ Panel Zarządzania Warsztatem</h1>

    <!-- Sekcja Kontrolna -->
    <div class="card">
        <h2>Nawigacja i Synchronizacja</h2>
        <p style="margin-bottom: 15px; color: #8b949e;">Zarządzaj połączeniem z zewnętrzną bazą danych części.</p>
        <a href="magazynek.html" class="btn btn-nav">📦 Otwórz Pełny Magazynek</a>
        <button onclick="wymusAktualizacjeZGitHub()" class="btn">🔄 Synchronizuj z GitHub</button>
        
        <div id="syncStatus" class="status-box">Ładowanie bazy danych...</div>
    </div>

    <!-- Sekcja dynamicznego podglądu danych z GitHuba -->
    <div class="card">
        <h2>Szybki Podgląd Stanów (z pliku baza.json)</h2>
        <div id="podgladZawartosci" class="grid-podglad">
            <!-- Stare, fikcyjne dane zostały usunięte. Tutaj JS wstrzyknie dane z GitHuba -->
        </div>
    </div>
</div>

<script>
    // 1. WKLEJ TUTAJ SWÓJ LINK RAW Z GITHUB
    const URL_BAZY = "https://raw.githubusercontent.com/TWÓJ_LOGIN/TWÓJ_REPOZYTORIUM/main/baza.json";

    // Główna funkcja pobierająca i odświeżająca widok na stronie głównej
    async function wczytajBazeNaStroneGlowna(wymus = false) {
        const statusBox = document.getElementById("syncStatus");
        let parts = [];

        // Próba odczytu z localStorage, jeśli nie wymuszamy pobierania z sieci
        if (!wymus && localStorage.getItem("magazynek_parts")) {
            parts = JSON.parse(localStorage.getItem("magazynek_parts"));
            statusBox.innerHTML = "✅ Załadowano aktualne dane z pamięci podręcznej.";
            renderujPodglad(parts);
            return;
        }

        try {
            statusBox.innerHTML = "⏳ Pobieranie świeżych danych z GitHub...";
            const odpowiedz = await fetch(URL_BAZY);
            if (!odpowiedz.ok) throw new Error('Błąd pobierania pliku');
            
            parts = await odpowiedz.json();
            
            // Nadpisujemy lokalną pamięć rzeczywistymi danymi
            localStorage.setItem("magazynek_parts", JSON.stringify(parts));
            statusBox.innerHTML = `✅ Zsynchronizowano pomyślnie! Wczytano elementów: ${parts.length}.`;
            
            renderujPodglad(parts);
        } catch (err) {
            console.error(err);
            statusBox.innerHTML = "❌ Błąd pobierania z GitHub. Używam ostatnich znanych danych.";
            
            // Awaryjne wyświetlenie tego co jest w pamięci
            parts = JSON.parse(localStorage.getItem("magazynek_parts")) || [];
            renderujPodglad(parts);
        }
    }

    // Generowanie kafelków podglądu na bazie realnych danych
    function renderujPodglad(listaCzesci) {
        const kontener = document.getElementById("podgladZawartosci");
        kontener.innerHTML = ""; // Czyszczenie widoku

        if (listaCzesci.length === 0) {
            kontener.innerHTML = "<p style='color: #8b949e; grid-column: 1/-1;'>Baza danych jest pusta lub nie została załadowana.</p>";
            return;
        }

        // Wyświetlamy np. pierwsze 8 elementów jako szybki podgląd w panelu
        const doWyswietlenia = listaCzesci.slice(0, 8);

        doWyswietlenia.forEach(item => {
            const div = document.createElement("div");
            div.className = "item-mini";
            div.innerHTML = `
                <span>${item.name}</span>
                <span class="item-qty">${item.qty} szt.</span>
            `;
            kontener.appendChild(div);
        });

        if (listaCzesci.length > 8) {
            const info = document.createElement("p");
            info.style.cssText = "grid-column: 1/-1; color: #8b949e; font-size: 0.85rem; margin-top: 10px;";
            info.innerHTML = `...oraz ${listaCzesci.length - 8} innych pozycji. Pełną listę znajdziesz w zakładce Magazynek.`;
            kontener.appendChild(info);
        }
    }

    function wymusAktualizacjeZGitHub() {
        wczytajBazeZGitHubu(true); 
    }

    // Wywołanie przy starcie
    wczytajBazeNaStroneGlowna();
</script>

</body>
</html>
